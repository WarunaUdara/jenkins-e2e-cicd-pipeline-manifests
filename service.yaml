apiVersion: v1
kind: Service
metadata:
  name: todo-app-go-service
  labels:
    app: todo-app-go
    environment: production
    managed-by: argocd
spec:
  type: LoadBalancer
  selector:
    app: todo-app-go
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  sessionAffinity: None
  externalTrafficPolicy: Cluster
